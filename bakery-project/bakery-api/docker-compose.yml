services:
  backend:
    build: .
    container_name: bakery_backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bakery_db
      DB_USER: bakery_user
      DB_PASSWORD: bakery_password
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: bakery_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bakery_db
      POSTGRES_USER: bakery_user
      POSTGRES_PASSWORD: bakery_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: